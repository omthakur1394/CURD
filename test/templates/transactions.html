<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #f6d365, #fda085);
            color: #333;
        }

        .custom-container {
            border: 2px solid #f6d365;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .transaction-table {
            margin-top: 20px;
        }

        .transaction-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: #f6d365;
            border-color: #f6d365;
        }

        .btn-primary:hover {
            background-color: #f6d365;
            border-color: #f6d365;
        }
    </style>
</head>
<body>
    <div class="container custom-container">
        <h1 class="text-center">Transaction Records</h1>

        {% if transactions %}
        <table class="table transaction-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for transaction in transactions %}
                <tr>
                    <td>{{ transaction.date }}</td>
                    <td>{{ transaction.amount }}</td>
                    <td class="transaction-actions">
                        <a class="btn btn-sm btn-primary" role="button" aria-label="Edit transaction {{ transaction.id }}" href="{{ url_for('edit_transaction', transaction_id=transaction.id) }}">Edit</a>

                        <form method="post" action="{{ url_for('delete_transaction', transaction_id=transaction.id) }}" style="display:inline;">
                            {{ csrf_token() }}
                            <button type="submit" class="btn btn-sm btn-danger" aria-label="Delete transaction {{ transaction.id }}" onclick="return confirm('Are you sure you want to delete this transaction?');">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
            <p class="text-center">No transactions found.</p>
        {% endif %}

        <div class="d-flex justify-content-center">
            <a class="btn btn-success" href="{{ url_for('add_transaction') }}">Add Transaction</a>
        </div>
    </div>
</body>
</html>
